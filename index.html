<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Map ξ</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="layout">
      <header class="header">
        <div>
          <p class="eyebrow">Thrall's problem for two rows</p>
          <h1>The map ξ</h1>
        </div>
        <p class="header-note">
          The construction
          <span class="math">ξ = Φ<sub>0</sub> ∘ Ω ∘ Ψ<sub>U</sub></span>.
        </p>
      </header>

      <section class="input-panel">
        <label for="tableau-input">Input standard Young tableau T</label>
        <textarea id="tableau-input" spellcheck="false"></textarea>
        <div class="actions">
          <button id="run-button" type="button">Run construction</button>
          <button id="example-button" type="button" class="secondary">Load example</button>
        </div>
        <div class="random-controls">
          <label for="random-n">Random element of <span class="math">SYT<sup>=</sup>(2n)</span></label>
          <div class="random-row">
            <input id="random-n" type="number" min="1" max="100" value="10">
            <button id="random-button" type="button" class="secondary">Random T</button>
          </div>
          <p class="random-note">n ≤ 5: exact uniform. n &gt; 5: constructive random. Large n may take a few seconds.</p>
        </div>
        <p class="hint">
          One row per line. Example: <code>1 2 4 7 9</code>.<br>
          For non-<span class="math">SYT<sup>=</sup>(2n)</span> input, the output is not
          <span class="math">ξ(T)</span>.
        </p>
        <div id="error-box" class="error" hidden></div>
      </section>

      <section class="viewer">
        <aside class="sidebar">
          <div id="meta-box" class="meta"></div>
          <div class="step-nav">
            <button id="prev-step" type="button">Previous</button>
            <span id="step-counter">0 / 0</span>
            <button id="next-step" type="button">Next</button>
          </div>
          <div id="step-list" class="step-list"></div>
        </aside>

        <article id="step-container" class="step-container"></article>
      </section>
    </main>

    <script type="module" src="./src/app.mjs?v=20260517-random-n100"></script>
  </body>
</html>
